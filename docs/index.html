<!DOCTYPE html>
<html lang="de-CH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <title>Schweiz-Urlaub 2026</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(160deg, #eef6ff, #dcefe4);
      color: #1c2b33;
      text-align: center;
      padding: 2rem;
      box-sizing: border-box;
    }
    @media (prefers-color-scheme: dark) {
      body { background: linear-gradient(160deg, #10222e, #14301f); color: #e8f1f5; }
    }
    h1 { font-size: clamp(1.6rem, 5vw, 2.6rem); margin: 0 0 .5rem; }
    p  { font-size: clamp(1rem, 3vw, 1.2rem); margin: .4rem 0; }
    .peak { font-size: 3rem; }
  </style>
</head>
<body>
  <main>
    <div class="peak">🏔️🚵🛷</div>
    <h1>Schweiz-Urlaub 2026</h1>
    <p>Unser Bergabenteuer in Graubünden — August 2026.</p>
    <p>Die Planungsseite entsteht gerade. Bald gibt's hier Ausflugsziele, Tagespläne und mehr!</p>
  </main>
</body>
</html>
